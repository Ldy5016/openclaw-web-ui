<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 启动中</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      user-select: none;
    }
    .container {
      text-align: center;
      padding: 20px;
    }
    .logo {
      font-size: 72px;
      margin-bottom: 20px;
      animation: bounce 1.2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    .loader-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .loader {
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      animation: loader 1.4s infinite ease-in-out both;
    }
    .loader:nth-child(1) { animation-delay: -0.32s; }
    .loader:nth-child(2) { animation-delay: -0.16s; }
    .loader:nth-child(3) { animation-delay: 0s; }
    
    @keyframes loader {
      0%, 80%, 100% { 
        transform: scale(0);
        opacity: 0.5;
      }
      40% { 
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .status {
      font-size: 14px;
      padding: 8px 20px;
      background: rgba(0,0,0,0.15);
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🦞</div>
    <div class="title">OpenClaw</div>
    <div class="subtitle">AI 助手</div>
    <div class="loader-container">
      <div class="loader"></div>
      <div class="loader"></div>
      <div class="loader"></div>
    </div>
    <div class="status" id="status">正在启动...</div>
  </div>
</body>
</html>
